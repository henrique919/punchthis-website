name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, links, claims
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:links
      - run: npm run check:claims
      - run: npm run check:tokens
      - run: npm run check:media
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  a11y-and-responsive:
    name: Accessibility + responsive overflow
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: npx playwright install --with-deps chromium
      - name: Serve production build
        run: npx vite preview --port 4173 &
      - name: Wait for preview server
        run: timeout 30 bash -c 'until curl -sf http://localhost:4173 >/dev/null; do sleep 1; done'
      - run: npm run check:a11y
        env:
          CHECK_SCREENSHOT_DIR: ci-screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: ci-screenshots
          retention-days: 14
